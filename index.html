<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#070809">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NerdMiner">
  <meta name="description" content="NerdMiner Fleet Dashboard – Blitzpool Solo Mining">
  <title>NerdMiner Fleet</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #070809;
      --bg2: #0f1311;
      --bg3: #181d1a;
      --lcd-1: #0c1a0c;
      --lcd-2: #091309;
      --lcd-border: #244a24;
      --green: #2bff8c;
      --green-soft: #8fe9ad;
      --green-dim: #9fd6ab;
      --amber: #ffb31c;
      --amber-soft: #ffcf6b;
      --red: #ff5a3c;
      --border: #20262300;
      --border-line: #232a26;
      --border2: #2c332e;
      --text: #e9ede9;
      --text2: #9aa69c;
      --text3: #6b756d;
      --accent: #1fd66b;
      --glow: 0 0 10px rgba(43,255,140,0.30);
      --mono: 'Share Tech Mono', 'Courier New', monospace;
      --disp: 'Chakra Petch', 'Share Tech Mono', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background:
        radial-gradient(130% 90% at 50% -15%, #0d1a12 0%, #080a09 48%, #060708 100%) fixed;
      color: var(--text);
      font-family: var(--mono);
      min-height: 100vh;
      padding-bottom: calc(env(safe-area-inset-bottom) + 18px);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: linear-gradient(180deg, rgba(8,10,9,0.96), rgba(8,10,9,0.78));
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border-line);
      padding: 12px 16px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header-left { display: flex; align-items: center; gap: 11px; }
    .header-logo {
      width: 36px; height: 36px;
      background: linear-gradient(145deg, #ffc043, #f0950d);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 19px;
      box-shadow: 0 2px 10px rgba(240,149,13,0.35), inset 0 1px 0 rgba(255,255,255,0.4);
    }
    .header-title {
      font-family: var(--disp);
      font-size: 17px; font-weight: 700; color: var(--amber);
      letter-spacing: 0.02em; line-height: 1;
    }
    .header-sub {
      font-family: var(--disp);
      font-size: 9.5px; color: var(--text3); letter-spacing: 0.22em;
      margin-top: 3px; text-transform: uppercase;
    }
    .btn-refresh {
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 9px;
      color: var(--green-soft);
      font-family: var(--disp); font-weight: 600;
      font-size: 12px; letter-spacing: 0.05em;
      padding: 8px 13px;
      cursor: pointer;
      display: flex; align-items: center; gap: 7px;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-refresh:active { background: var(--border2); border-color: var(--accent); }
    .btn-refresh.loading svg { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Status bar ── */
    .status-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 16px;
      background: rgba(15,19,17,0.5);
      border-bottom: 1px solid var(--border-line);
      font-size: 11px;
      color: var(--text2);
      letter-spacing: 0.03em;
    }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); flex-shrink: 0; box-shadow: var(--glow); }
    .status-dot.error { background: var(--red); box-shadow: 0 0 9px rgba(255,90,60,0.5); }
    .status-dot.loading { background: var(--amber); box-shadow: 0 0 9px rgba(255,179,28,0.5); animation: pulse 1s ease infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.25; } }

    /* ── Summary cards ── */
    .summary {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
      padding: 14px 12px 6px;
    }
    .sum-card {
      position: relative;
      background: linear-gradient(160deg, #11161300, #0d110f);
      background-color: #0e1311;
      border: 1px solid var(--border-line);
      border-radius: 13px;
      padding: 12px 14px;
      overflow: hidden;
    }
    .sum-card::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
      background: var(--accent); opacity: 0.7;
    }
    .sum-card.amber-edge::before { background: var(--amber); }
    .sum-card.wide { grid-column: span 2; }
    .sum-label {
      font-family: var(--disp);
      font-size: 9.5px; color: var(--text2); letter-spacing: 0.13em;
      text-transform: uppercase; margin-bottom: 7px; font-weight: 600;
    }
    .sum-value-row { display: flex; align-items: baseline; gap: 7px; }
    .sum-value {
      font-family: var(--mono);
      font-size: 30px; font-weight: 400; color: var(--green); line-height: 0.9;
      text-shadow: var(--glow);
    }
    .sum-card:not(.wide) .sum-value { font-size: 25px; }
    .sum-value.amber { color: var(--amber); text-shadow: 0 0 10px rgba(255,179,28,0.28); }
    .sum-value.dim { color: var(--green-soft); text-shadow: none; font-size: 24px; }
    .sum-unit { font-size: 12px; color: var(--text2); }
    .sum-card .sum-unit.block { display: block; margin-top: 5px; font-size: 11px; }

    /* ── Section label ── */
    .section-label {
      font-family: var(--disp);
      font-size: 10px; color: var(--text3); letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 14px 14px 6px;
      display: flex; align-items: center; gap: 8px;
    }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border-line); }

    /* ── Miner Display Cards ── */
    .miners-grid { padding: 0 10px; display: flex; flex-direction: column; gap: 10px; }

    .nm-card {
      background: #0a0c0b;
      border: 1px solid var(--border2);
      border-radius: 13px;
      overflow: hidden;
      box-shadow: 0 4px 18px rgba(0,0,0,0.35);
      animation: cardIn 0.45s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes cardIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

    .nm-card-top {
      background: linear-gradient(180deg, #131815, #0e1210);
      border-bottom: 1px solid #1c221e;
      padding: 8px 12px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nm-card-id {
      font-family: var(--disp); font-weight: 700;
      font-size: 13px; color: var(--amber); letter-spacing: 0.04em;
    }
    .nm-card-status { font-size: 10.5px; font-family: var(--disp); font-weight: 600; display: flex; align-items: center; gap: 5px; letter-spacing: 0.06em; }
    .nm-card-status .dot { width: 6px; height: 6px; border-radius: 50%; }
    .nm-card-status.online .dot { background: var(--green); box-shadow: var(--glow); animation: pulse 1.6s ease infinite; }
    .nm-card-status.online .label { color: var(--green-soft); }
    .nm-card-status.offline .dot { background: var(--red); }
    .nm-card-status.offline .label { color: var(--red); }

    .nm-card-body {
      padding: 11px 11px 9px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 11px;
      align-items: stretch;
    }

    .nm-lcd {
      position: relative;
      background: linear-gradient(160deg, var(--lcd-1), var(--lcd-2));
      border: 1px solid var(--lcd-border);
      border-radius: 8px;
      padding: 10px 12px;
      box-shadow: inset 0 0 16px rgba(0,40,0,0.45);
      overflow: hidden;
    }
    /* faint LCD scanlines */
    .nm-lcd::after {
      content: ''; position: absolute; inset: 0; pointer-events: none;
      background: repeating-linear-gradient(0deg, rgba(0,0,0,0.16) 0 1px, transparent 1px 3px);
      opacity: 0.5;
    }
    .nm-row {
      position: relative; z-index: 1;
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 8px;
    }
    .nm-row:last-child { margin-bottom: 0; }
    .nm-key {
      font-family: var(--disp); font-weight: 600;
      font-size: 10.5px; color: var(--green-dim); letter-spacing: 0.08em;
    }
    .nm-val {
      font-family: var(--mono);
      font-size: 15px; color: var(--green); font-weight: 400;
      text-shadow: 0 0 7px rgba(43,255,140,0.28);
    }
    .nm-val.amber { color: var(--amber-soft); text-shadow: 0 0 7px rgba(255,179,28,0.25); }
    .nm-val .unit { font-size: 10px; color: var(--green-dim); }
    .nm-val.best { font-size: 16px; }
    .nm-session { font-family: var(--mono); font-size: 12px; color: var(--green-dim); letter-spacing: 0.04em; }

    .nm-bar-wrap { position: relative; z-index: 1; margin-top: 10px; }
    .nm-bar-label { display: flex; justify-content: space-between; font-family: var(--disp); font-size: 9px; color: var(--green-dim); letter-spacing: 0.1em; margin-bottom: 4px; text-transform: uppercase; }
    .nm-bar-bg { background: #061006; border: 1px solid #163216; border-radius: 3px; height: 6px; overflow: hidden; }
    .nm-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #138a45, var(--green));
      border-radius: 3px;
      box-shadow: 0 0 8px rgba(43,255,140,0.45);
      transition: width 0.7s cubic-bezier(0.22,1,0.36,1);
    }

    .nm-meta { display: flex; flex-direction: column; justify-content: center; gap: 7px; text-align: right; min-width: 74px; }
    .nm-meta-row { font-size: 11px; color: var(--text2); white-space: nowrap; line-height: 1.1; }
    .nm-meta-row .mk { display: block; font-family: var(--disp); font-size: 8.5px; color: var(--text3); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 1px; }
    .nm-meta-row .mv { color: var(--text); font-size: 13px; }

    .nm-footer {
      background: #080a09;
      border-top: 1px solid #161a17;
      padding: 5px 12px;
      font-family: var(--disp);
      font-size: 8.5px;
      color: #5b655d;
      letter-spacing: 0.16em;
      display: flex; justify-content: space-between;
    }

    /* ── Error state ── */
    .error-box {
      margin: 14px 12px;
      background: #140e0e;
      border: 1px solid #3a1f1a;
      border-radius: 13px;
      padding: 24px 20px;
      text-align: center;
    }
    .error-icon { font-size: 30px; margin-bottom: 10px; }
    .error-title { font-family: var(--disp); font-weight: 700; color: var(--red); font-size: 14px; margin-bottom: 8px; letter-spacing: 0.04em; }
    .error-msg { color: var(--text2); font-size: 12px; line-height: 1.6; }

    /* ── Footer hint ── */
    .pull-hint { text-align: center; font-size: 10.5px; color: var(--text3); padding: 14px 12px 4px; letter-spacing: 0.03em; }

    .loading-row { padding: 26px; text-align: center; color: var(--text3); font-size: 12px; letter-spacing: 0.05em; }
  </style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <div class="header-logo">⛏</div>
    <div>
      <div class="header-title">NerdMiner Fleet</div>
      <div class="header-sub">Blitzpool · Solo Mining</div>
    </div>
  </div>
  <button class="btn-refresh" id="btn-refresh" onclick="loadData()">
    <svg id="refresh-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="23 4 23 10 17 10"></polyline>
      <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
    </svg>
    Aktualisieren
  </button>
</header>

<div class="status-bar">
  <div class="status-dot loading" id="status-dot"></div>
  <span id="status-text">Verbinde mit Blitzpool…</span>
</div>

<div class="summary">
  <div class="sum-card wide">
    <div class="sum-label">Gesamt-Hashrate</div>
    <div class="sum-value-row">
      <span class="sum-value" id="s-hashrate">–</span>
      <span class="sum-unit" id="s-hr-unit"></span>
    </div>
  </div>
  <div class="sum-card amber-edge">
    <div class="sum-label">Beste Schwierigkeit</div>
    <div class="sum-value amber" id="s-diff">–</div>
  </div>
  <div class="sum-card">
    <div class="sum-label">Geräte online</div>
    <div class="sum-value" id="s-online">–</div>
    <div class="sum-unit block" id="s-online-sub"></div>
  </div>
  <div class="sum-card wide">
    <div class="sum-label">Shares gesamt</div>
    <div class="sum-value dim" id="s-shares">–</div>
  </div>
</div>

<div class="section-label">Miner-Displays</div>
<div class="miners-grid" id="miners-grid">
  <div class="loading-row">Lade Miner-Daten…</div>
</div>
<div class="pull-hint" id="last-update"></div>

<script>
const ADDRESS = 'bc1quygy4j3weetpm9emqmmv50esnxx7m25pgleqgu';
const API = `https://blitzpool.yourdevice.ch:3334/api/client/${ADDRESS}`;

let firstRender = true;

// ── Formatters ──
function fmtHR(hs) {
  if (hs == null || isNaN(hs)) return { v: '–', u: '' };
  hs = Number(hs);
  if (hs >= 1e12) return { v: (hs/1e12).toFixed(2), u: 'TH/s' };
  if (hs >= 1e9)  return { v: (hs/1e9).toFixed(2),  u: 'GH/s' };
  if (hs >= 1e6)  return { v: (hs/1e6).toFixed(2),  u: 'MH/s' };
  if (hs >= 1e3)  return { v: (hs/1e3).toFixed(2),  u: 'KH/s' };
  return { v: hs.toFixed(1), u: 'H/s' };
}
function fmtDiff(d) {
  if (d == null || d === '') return '–';
  d = Number(d);
  if (isNaN(d)) return '–';
  if (d >= 1e12) return (d/1e12).toFixed(2) + 'T';
  if (d >= 1e9)  return (d/1e9).toFixed(2) + 'G';
  if (d >= 1e6)  return (d/1e6).toFixed(2) + 'M';
  if (d >= 1e3)  return (d/1e3).toFixed(1) + 'K';
  return d.toFixed(2);
}
function fmtUptime(h) {
  if (!h && h !== 0) return '';
  h = parseFloat(h);
  if (h >= 24) return (h/24).toFixed(1) + 'd';
  return h.toFixed(1) + 'h';
}
function timeSince(ts) {
  if (!ts) return '';
  const d = Math.floor((Date.now() - new Date(ts)) / 1000);
  if (d < 60) return d + 's';
  if (d < 3600) return Math.floor(d/60) + 'm';
  if (d < 86400) return Math.floor(d/3600) + 'h';
  return Math.floor(d/86400) + 'd';
}
function isOnline(s) {
  return !s.offline && (!s.lastSeen || (Date.now() - new Date(s.lastSeen)) < 300000);
}
function set(id, val) { const el = document.getElementById(id); if (el) el.textContent = val; }

// ── Status helpers ──
function setStatus(state, msg) {
  document.getElementById('status-dot').className = 'status-dot ' + state;
  set('status-text', msg);
}
function setRefreshLoading(on) {
  document.getElementById('btn-refresh').classList.toggle('loading', on);
}

// ── Render summary ──
function renderSummary(data) {
  const workers = data.workers || [];
  const totalHs = (data.totalHashrate != null)
    ? Number(data.totalHashrate)
    : workers.reduce((sum, w) => sum + Number(w.hashRate || 0), 0);
  const hr = fmtHR(totalHs);
  set('s-hashrate', hr.v);
  set('s-hr-unit', hr.u);

  let bestDiff = Number(data.bestDifficulty || 0);
  workers.forEach(w => { const d = Number(w.bestDifficulty || 0); if (d > bestDiff) bestDiff = d; });
  set('s-diff', fmtDiff(bestDiff));

  const total = data.workersCount || workers.length || 0;
  const online = workers.filter(isOnline).length;
  set('s-online', online + ' / ' + total);
  set('s-online-sub', total === 1 ? 'Gerät' : 'Geräte aktiv');

  set('s-shares', (data.totalShares != null) ? fmtDiff(data.totalShares) : '–');
}

// ── Render miner cards ──
function renderMiners(sessions) {
  const grid = document.getElementById('miners-grid');
  if (!sessions || !sessions.length) {
    grid.innerHTML = '<div class="loading-row">Keine aktiven Sessions gefunden.</div>';
    return;
  }

  // Logarithmische Skala für die Balken, damit KH/s-Geräte neben TH/s-Geräten sichtbar bleiben
  const rates = sessions.map(s => Number(s.hashRate || s.hashrate || 0)).filter(v => v > 0);
  const lmin = rates.length ? Math.log10(Math.min(...rates)) : 0;
  const lmax = rates.length ? Math.log10(Math.max(...rates)) : 1;
  function barPct(hr) {
    if (hr <= 0 || !isFinite(lmin) || lmax === lmin) return 12;
    const p = (Math.log10(hr) - lmin) / (lmax - lmin);
    return Math.max(12, Math.round(12 + p * 88));
  }

  grid.innerHTML = sessions.map((s, i) => {
    const id = (s.sessionId || s.id || s.name || '????????').toString().slice(0, 8);
    const hr = Number(s.hashRate || s.hashrate || s.totalHashrate || 0);
    const hrFmt = fmtHR(hr);
    const diff = s.bestDifficulty || s.difficulty || 0;
    let uptime = s.startTime
      ? fmtUptime(Math.max(0, (Date.now() - new Date(s.startTime)) / 3600000))
      : fmtUptime(s.uptimeHours || s.uptime);
    const lastSeen = timeSince(s.lastSeen || s.updatedAt);
    const pct = barPct(hr);
    const online = isOnline(s);

    const rawName = (s.name || '').toLowerCase();
    const label = rawName ? rawName.toUpperCase() : 'WORKER';
    const deviceType = rawName.includes('bitaxe') ? 'BITAXE' : 'NERDMINER · LILYGO';
    const delay = firstRender ? (i * 65) : 0;

    return `
    <div class="nm-card" style="animation-delay:${delay}ms">
      <div class="nm-card-top">
        <span class="nm-card-id">⛏ ${label} #${String(i+1).padStart(2,'0')}</span>
        <span class="nm-card-status ${online ? 'online' : 'offline'}">
          <span class="dot"></span>
          <span class="label">${online ? 'ONLINE' : 'OFFLINE'}</span>
        </span>
      </div>
      <div class="nm-card-body">
        <div class="nm-lcd">
          <div class="nm-row">
            <span class="nm-key">Hashrate</span>
            <span class="nm-val">${hrFmt.v} <span class="unit">${hrFmt.u}</span></span>
          </div>
          <div class="nm-row">
            <span class="nm-key">Best Diff</span>
            <span class="nm-val amber best">${fmtDiff(diff)}</span>
          </div>
          <div class="nm-row">
            <span class="nm-key">Session</span>
            <span class="nm-session">${id}</span>
          </div>
          <div class="nm-bar-wrap">
            <div class="nm-bar-label"><span>Leistung</span></div>
            <div class="nm-bar-bg"><div class="nm-bar-fill" style="width:${pct}%"></div></div>
          </div>
        </div>
        <div class="nm-meta">
          ${uptime ? `<div class="nm-meta-row"><span class="mk">Laufzeit</span><span class="mv">${uptime}</span></div>` : ''}
          ${lastSeen ? `<div class="nm-meta-row"><span class="mk">Zuletzt</span><span class="mv">${lastSeen}</span></div>` : ''}
        </div>
      </div>
      <div class="nm-footer">
        <span>${deviceType}</span>
        <span>BTC SOLO</span>
      </div>
    </div>`;
  }).join('');

  firstRender = false;
}

// ── Ehrliche Fehleranzeige (kein heimliches Demo) ──
function showError(reason) {
  ['s-hashrate','s-diff','s-online','s-shares'].forEach(id => set(id, '–'));
  set('s-hr-unit', '');
  set('s-online-sub', '');
  document.getElementById('miners-grid').innerHTML =
    '<div class="error-box">' +
    '<div class="error-icon">⚠️</div>' +
    '<div class="error-title">Keine Verbindung zu Blitzpool</div>' +
    '<div class="error-msg">' + reason +
    '<br><br>Abgefragte Adresse:<br>' +
    '<span style="color:var(--green-dim); word-break:break-all;">' + API + '</span>' +
    '<br><br>Tipp: Diese Adresse direkt im Browser öffnen – erscheinen dort Daten, ' +
    'liegt es am Zugriffsschutz des Pools.</div></div>';
}

// ── Main load ──
async function loadData() {
  setStatus('loading', 'Verbinde mit Blitzpool…');
  setRefreshLoading(true);

  try {
    const res = await fetch(API, { headers: { 'Accept': 'application/json' }, cache: 'no-cache' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();

    renderSummary(data);

    const sessions =
      data.workers ||
      data.sessions ||
      (data.workers && data.workers[0] && data.workers[0].sessions) ||
      [];

    renderMiners(sessions);
    setStatus('online', 'Live · ' + new Date().toLocaleTimeString('de-CH'));
    set('last-update', 'Aktualisiert ' + new Date().toLocaleTimeString('de-CH') + ' · alle 60 s automatisch');

  } catch (err) {
    console.warn('API-Fehler:', err.message);
    const reason = (err instanceof TypeError)
      ? 'Verbindung blockiert. Eventuell bist du offline oder der Pool ist nicht erreichbar.'
      : 'Pool-Server-Antwort: ' + err.message;
    showError(reason);
    setStatus('error', 'Keine Live-Verbindung');
    set('last-update', 'Letzter Versuch: ' + new Date().toLocaleTimeString('de-CH'));
  }

  setRefreshLoading(false);
}

// ── Auto-refresh ──
loadData();
setInterval(loadData, 60000);

// ── Service Worker ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
