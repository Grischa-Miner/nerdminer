<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#f0f2f5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Röbis-Miner">
  <meta name="description" content="Röbis-Miner Fleet Dashboard – Blitzpool Solo Mining">
  <title>Röbis-Miner Fleet</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <style>
    :root {
      --bg: #f0f2f5;
      --bg2: #ffffff;
      --bg3: #e8eaed;
      --card: #ffffff;
      --lcd-bg: #f8f9ff;
      --lcd-border: #d0d8ff;
      --green: #1a1a2e;
      --green-dim: #4a5568;
      --green-dark: #e8eaed;
      --amber: #c05e00;
      --amber-dim: #a04e00;
      --red: #dc2626;
      --border: #e2e5ea;
      --border2: #d0d5dd;
      --text: #1a1a2e;
      --text2: #4a5568;
      --text3: #9ba3af;
      --accent: #1a1a2e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', Courier, monospace;
      min-height: 100vh;
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* ── Header ── */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-logo {
      width: 32px; height: 32px;
      background: var(--amber);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .header-title { font-size: 15px; font-weight: 600; color: var(--amber); letter-spacing: 0.04em; }
    .header-sub { font-size: 10px; color: var(--text3); letter-spacing: 0.06em; margin-top: 1px; }
    .btn-refresh {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text2);
      font-family: 'Courier New', monospace;
      font-size: 12px;
      padding: 6px 12px;
      cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      transition: background 0.15s;
    }
    .btn-refresh:active { background: var(--border2); }
    .btn-refresh.loading svg { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Status bar ── */
    .status-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 16px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      font-size: 10px;
      color: var(--text3);
    }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
    .status-dot.error { background: var(--red); }
    .status-dot.loading { background: var(--amber); animation: pulse 1s ease infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* ── Summary cards ── */
    .summary {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 12px 12px 6px;
    }
    .sum-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
    }
    .sum-card.wide { grid-column: span 2; }
    .sum-label { font-size: 9px; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; }
    .sum-value { font-size: 22px; font-weight: 600; color: var(--green); line-height: 1; }
    .sum-value.amber { color: var(--amber); }
    .sum-unit { font-size: 10px; color: var(--text2); margin-top: 2px; }
    .sum-streak { font-size: 13px; color: var(--amber); }

    /* ── Section label ── */
    .section-label {
      font-size: 9px; color: var(--text3); letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 8px 12px 4px;
    }

    /* ── Miner Display Cards ── */
    .miners-grid { padding: 0 8px 20px; display: flex; flex-direction: column; gap: 8px; }

    .nm-card {
      background: #ffffff;
      border: 2px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }
    .nm-card-top {
      background: #f8f9fa;
      border-bottom: 1px solid #e2e5ea;
      padding: 5px 10px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nm-card-id { font-size: 12px; color: var(--amber); font-weight: 600; letter-spacing: 0.05em; }
    .nm-card-status { font-size: 10px; display: flex; align-items: center; gap: 4px; }
    .nm-card-status .dot { width: 5px; height: 5px; border-radius: 50%; }
    .nm-card-status.online .dot { background: var(--green); }
    .nm-card-status.online .label { color: var(--green); }
    .nm-card-status.offline .dot { background: var(--red); }
    .nm-card-status.offline .label { color: var(--red); }

    .nm-card-body {
      padding: 8px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: start;
    }

    .nm-lcd {
      background: var(--lcd-bg);
      border: 1px solid var(--lcd-border);
      border-radius: 5px;
      padding: 7px 9px;
    }
    .nm-row {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 5px;
    }
    .nm-row:last-child { margin-bottom: 0; }
    .nm-key { font-size: 9px; color: var(--green-dim); letter-spacing: 0.06em; }
    .nm-val { font-size: 14px; color: var(--green); font-weight: 600; }
    .nm-val.amber { color: var(--amber); }
    .nm-val .unit { font-size: 9px; font-weight: 400; }
    .nm-val.best { font-size: 16px; }

    .nm-bar-wrap { margin-top: 6px; }
    .nm-bar-label { display: flex; justify-content: space-between; font-size: 8px; color: var(--text3); margin-bottom: 3px; }
    .nm-bar-bg { background: #f0f2f5; border: 1px solid #e2e5ea; border-radius: 2px; height: 4px; overflow: hidden; }
    .nm-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.6s ease; }

    .nm-meta { text-align: right; }
    .nm-meta-row { font-size: 9px; color: var(--text3); margin-bottom: 3px; white-space: nowrap; }
    .nm-meta-row.highlight { color: var(--amber-dim); }

    .nm-footer {
      background: #f8f9fa;
      border-top: 1px solid var(--border);
      padding: 3px 10px;
      font-size: 8px;
      color: var(--text3);
      letter-spacing: 0.1em;
      display: flex; justify-content: space-between;
    }

    /* ── Skeleton loading ── */
    .skeleton { background: var(--bg2); border-radius: 4px; animation: shimmer 1.2s ease infinite; }
    @keyframes shimmer { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }

    /* ── Error state ── */
    .error-box {
      margin: 12px;
      background: var(--bg2);
      border: 1px solid #3a1a1a;
      border-radius: 10px;
      padding: 20px;
      text-align: center;
    }
    .error-icon { font-size: 32px; margin-bottom: 8px; }
    .error-title { color: var(--red); font-size: 13px; margin-bottom: 6px; }
    .error-msg { color: var(--text3); font-size: 11px; line-height: 1.5; }

    /* ── Demo banner ── */
    .demo-banner {
      margin: 0 8px 8px;
      background: rgba(240, 165, 0, 0.08);
      border: 1px solid rgba(240, 165, 0, 0.2);
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 10px;
      color: var(--amber-dim);
      display: flex; align-items: center; gap: 6px;
    }

    /* ── Pull to refresh hint ── */
    .pull-hint {
      text-align: center;
      font-size: 10px;
      color: var(--text3);
      padding: 8px;
    }
  </style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <div class="header-logo">⛏</div>
    <div>
      <div class="header-title">Röbis-Miner Fleet</div>
      <div class="header-sub">BLITZPOOL SOLO MINING</div>
    </div>
  </div>
  <button class="btn-refresh" id="btn-refresh" onclick="loadData()">
    <svg id="refresh-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="23 4 23 10 17 10"></polyline>
      <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
    </svg>
    Refresh
  </button>
</header>

<div class="status-bar">
  <div class="status-dot loading" id="status-dot"></div>
  <span id="status-text">Verbinde mit Blitzpool…</span>
</div>

<div class="summary">
  <div class="sum-card">
    <div class="sum-label">Gesamt-Hashrate</div>
    <div class="sum-value" id="s-hashrate">–</div>
    <div class="sum-unit" id="s-hr-unit">–</div>
  </div>
  <div class="sum-card">
    <div class="sum-label">Beste Schwierigkeit</div>
    <div class="sum-value amber" id="s-diff">–</div>
    <div class="sum-unit">global best</div>
  </div>
  <div class="sum-card">
    <div class="sum-label">Total Shares</div>
    <div class="sum-value" id="s-streak">–</div>
    <div class="sum-unit" id="s-streak-since">eingereichte Shares</div>
  </div>
  <div class="sum-card">
    <div class="sum-label">Worker Online</div>
    <div class="sum-value amber" id="s-luck">–</div>
    <div class="sum-unit" id="s-workers">aktive Sessions</div>
  </div>
</div>

<div class="section-label">⬛ Miner-Displays</div>
<div id="demo-banner" style="display:none;" class="demo-banner">
  ⚡ Demo-Modus – echte Daten via Handy-App mit lokalem Netzwerk
</div>
<div class="miners-grid" id="miners-grid">
  <div style="padding: 20px; text-align: center; color: var(--text3); font-size: 12px;">Lade Miner-Daten…</div>
</div>
<div class="pull-hint" id="last-update"></div>

<script>
const ADDRESS = 'bc1qmqhcqyz906fw8djwmt68pe09ynfwjpauy5j8en';
const BASE = 'https://blitzpool.yourdevice.ch:3334';
const API      = `${BASE}/api/client/${ADDRESS}`;
const API_INFO = `${BASE}/api/info`;
const API_NET  = `${BASE}/api/network`;

// ── Formatters ──
function fmtHR(khz) {
  if (!khz && khz !== 0) return { v: '–', u: '' };
  if (khz >= 1e9) return { v: (khz/1e9).toFixed(2), u: 'TH/s' };
  if (khz >= 1e6) return { v: (khz/1e6).toFixed(2), u: 'GH/s' };
  if (khz >= 1e3) return { v: (khz/1e3).toFixed(2), u: 'MH/s' };
  return { v: khz.toFixed(1), u: 'KH/s' };
}
function fmtDiff(d) {
  if (!d && d !== 0) return '–';
  if (d >= 1e9) return (d/1e9).toFixed(2) + 'G';
  if (d >= 1e6) return (d/1e6).toFixed(2) + 'M';
  if (d >= 1e3) return (d/1e3).toFixed(1) + 'K';
  return parseFloat(d).toFixed(2);
}
function fmtUptime(h) {
  if (!h) return '';
  h = parseFloat(h);
  if (h >= 24) return (h/24).toFixed(1) + 'd';
  return h.toFixed(1) + 'h';
}
function timeSince(ts) {
  if (!ts) return '';
  const d = Math.floor((Date.now() - new Date(ts)) / 1000);
  if (d < 60) return d + 's ago';
  if (d < 3600) return Math.floor(d/60) + 'm ago';
  return Math.floor(d/3600) + 'h ago';
}

// ── Status helpers ──
function setStatus(state, msg) {
  const dot = document.getElementById('status-dot');
  dot.className = 'status-dot ' + state;
  document.getElementById('status-text').textContent = msg;
}
function setRefreshLoading(on) {
  document.getElementById('btn-refresh').classList.toggle('loading', on);
}

// ── Render summary ──
// data: /api/client/:address → bestDifficulty, workersCount, totalHashrate (H/s), workers[]
// info: /api/info → miningStreak, miningStreakSince, blockLuck, etc.
function renderSummary(data, info) {
  info = info || {};

  // totalHashrate in H/s → divide by 1000 for KH/s input to fmtHR
  const hr = fmtHR((data.totalHashrate || 0) / 1000);
  document.getElementById('s-hashrate').textContent = hr.v;
  document.getElementById('s-hr-unit').textContent = hr.u;

  document.getElementById('s-diff').textContent = fmtDiff(parseFloat(data.bestDifficulty) || 0);

  // Total shares
  const shares = (data.totalShares || 0).toLocaleString('de-CH');
  document.getElementById('s-streak').textContent = shares;

  // Workers online
  const wc = data.workersCount != null ? data.workersCount : (data.workers ? data.workers.length : 0);
  document.getElementById('s-luck').textContent = wc;
}

// ── Render miner cards ──
function renderMiners(sessions) {
  const grid = document.getElementById('miners-grid');
  if (!sessions || !sessions.length) {
    grid.innerHTML = '<div style="padding:20px; text-align:center; color:var(--text3); font-size:12px;">Keine aktiven Sessions gefunden.</div>';
    return;
  }
  const sorted = [...sessions].sort((a, b) => {
    const hrA = a.hashRate || a.hashrate || a.totalHashrate || 0;
    const hrB = b.hashRate || b.hashrate || b.totalHashrate || 0;
    return hrB - hrA;
  });

  const maxHR = Math.max(...sorted.map(s => s.hashRate || s.hashrate || s.totalHashrate || 0));

  grid.innerHTML = sorted.map((s, i) => {
    // API fields: sessionId, name, hashRate, bestDifficulty, currentDifficulty, startTime, lastSeen
    const id = (s.sessionId || s.id || '????????').toString().slice(0, 8);
    const hr = s.hashRate || s.hashrate || s.totalHashrate || 0;
    const hrFmt = fmtHR(hr);
    const diff = s.bestDifficulty || s.difficulty || 0;
    const uptimeHours = s.startTime ? (Date.now() - new Date(s.startTime)) / 3600000 : 0;
    const uptime = fmtUptime(uptimeHours);
    const lastSeen = timeSince(s.lastSeen || s.updatedAt);
    const pct = maxHR > 0 ? Math.round((hr / maxHR) * 100) : 0;
    const isOnline = !s.offline && (!s.lastSeen || (Date.now() - new Date(s.lastSeen)) < 300000);
    const shares = s.totalShares || s.shares || 0;
    const rejected = s.rejected || 0;

    return `
    <div class="nm-card">
      <div class="nm-card-top">
        <span class="nm-card-id">⛏ NERD #${String(i+1).padStart(2,'0')}</span>
        <span class="nm-card-status ${isOnline ? 'online' : 'offline'}">
          <span class="dot"></span>
          <span class="label">${isOnline ? 'ONLINE' : 'OFFLINE'}</span>
        </span>
      </div>
      <div class="nm-card-body">
        <div class="nm-lcd">
          <div class="nm-row">
            <span class="nm-key">HASHRATE</span>
            <span class="nm-val">${hrFmt.v} <span class="unit">${hrFmt.u}</span></span>
          </div>
          <div class="nm-row">
            <span class="nm-key">BEST DIFF</span>
            <span class="nm-val amber best">${fmtDiff(diff)}</span>
          </div>
          <div class="nm-row">
            <span class="nm-key">SESSION</span>
            <span style="font-size:10px; color:var(--green-dim); font-family:'Courier New',monospace;">${id}</span>
          </div>
          <div class="nm-bar-wrap">
            <div class="nm-bar-label">
              <span>Hashrate</span>
              <span>${pct}%</span>
            </div>
            <div class="nm-bar-bg"><div class="nm-bar-fill" style="width:${pct}%"></div></div>
          </div>
        </div>
        <div class="nm-meta">
          ${uptime ? `<div class="nm-meta-row">⏱ ${uptime}</div>` : ''}
          ${lastSeen ? `<div class="nm-meta-row">${lastSeen}</div>` : ''}
          ${shares ? `<div class="nm-meta-row highlight">${shares} shares</div>` : ''}
          ${rejected ? `<div class="nm-meta-row" style="color:#6a2a2a;">${rejected} rej</div>` : ''}
        </div>
      </div>
      <div class="nm-footer">
        <span>LILYGO · NERDMINER V2</span>
        <span>BTC SOLO</span>
      </div>
    </div>`;
  }).join('');
}

// ── Main load function ──
async function loadData() {
  setStatus('loading', 'Verbinde mit Blitzpool…');
  setRefreshLoading(true);

  try {
    const data = await fetch(API, { headers: { 'Accept': 'application/json' }, cache: 'no-cache' }).then(r => r.json());
    const info = {};

    renderSummary(data, info);

    // API returns workers[] directly with sessionId, hashRate, bestDifficulty, startTime, lastSeen
    const sessions = data.workers || [];
    renderMiners(sessions);

    document.getElementById('demo-banner').style.display = 'none';
    setStatus('online', 'Live · ' + new Date().toLocaleTimeString('de-CH'));
    document.getElementById('last-update').textContent =
      'Zuletzt aktualisiert: ' + new Date().toLocaleTimeString('de-CH') + ' · Auto-Refresh alle 60s';

  } catch (err) {
    console.warn('API error:', err.message, '– using demo data');
    loadDemo();
    setStatus('error', 'Demo-Modus (CORS) – auf Handy: Live-Daten');
    document.getElementById('demo-banner').style.display = 'flex';
  }

  setRefreshLoading(false);
}

// ── Demo data (based on your screenshot) ──
function loadDemo() {
  document.getElementById('s-hashrate').textContent = '1.80';
  document.getElementById('s-hr-unit').textContent = 'MH/s';
  document.getElementById('s-diff').textContent = '229.0';
  document.getElementById('s-streak').textContent = '468\'000';
  document.getElementById('s-streak-since').textContent = 'seit 08.05.2025';
  document.getElementById('s-luck').textContent = '7';
  document.getElementById('s-workers').textContent = '1 Worker · 7 Geräte';

  const demoSessions = [
    { id: '5f4fd2cf', hashrate: 253100, bestDifficulty: 3.45, uptimeHours: 15.9, online: true, shares: 468 },
    { id: 'b8ede00c', hashrate: 278400, bestDifficulty: 5.90, uptimeHours: 15.9, online: true, shares: 468 },
    { id: '7cfbc5bc', hashrate: 250600, bestDifficulty: 1.75, uptimeHours: 15.9, online: true, shares: 468 },
    { id: '4e20c3b0', hashrate: 260900, bestDifficulty: 3.60, uptimeHours: 15.9, online: true, shares: 468 },
    { id: '25acde83', hashrate: 254200, bestDifficulty: 229.02, uptimeHours: 15.9, online: true, shares: 468 },
    { id: 'ec17a32e', hashrate: 267000, bestDifficulty: 1.84,  uptimeHours: 15.9, online: true, shares: 468 },
    { id: 'd9131274', hashrate: 255600, bestDifficulty: 2.11,  uptimeHours: 15.9, online: true, shares: 468 },
  ];
  renderMiners(demoSessions);
  document.getElementById('last-update').textContent = 'Demo-Modus – öffne die App auf deinem Android-Handy für Live-Daten';
}

// ── Auto-refresh every 60s ──
loadData();
setInterval(loadData, 60000);

// ── Service Worker registration ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
