<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NerdMiner">
  <meta name="description" content="NerdMiner Fleet Dashboard – Blitzpool Solo Mining">
  <title>NerdMiner Fleet</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <style>
    :root {
      --bg: #0a0a0a;
      --bg2: #111111;
      --bg3: #1a1a1a;
      --card: #0d0d0d;
      --lcd-bg: #0d1a0d;
      --lcd-border: #1a3a1a;
      --green: #00dd55;
      --green-dim: #3d7a3d;
      --green-dark: #1a3a1a;
      --amber: #f0a500;
      --amber-dim: #8a5f00;
      --red: #cc3300;
      --border: #222222;
      --border2: #2a2a2a;
      --text: #cccccc;
      --text2: #888888;
      --text3: #444444;
      --accent: #00aa44;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', Courier, monospace;
      min-height: 100vh;
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* ── Header ── */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-logo {
      width: 32px; height: 32px;
      background: var(--amber);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .header-title { font-size: 15px; font-weight: 600; color: var(--amber); letter-spacing: 0.04em; }
    .header-sub { font-size: 10px; color: var(--text3); letter-spacing: 0.06em; margin-top: 1px; }
    .btn-refresh {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text2);
      font-family: 'Courier New', monospace;
      font-size: 12px;
      padding: 6px 12px;
      cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      transition: background 0.15s;
    }
    .btn-refresh:active { background: var(--border2); }
    .btn-refresh.loading svg { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Status bar ── */
    .status-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 16px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      font-size: 10px;
      color: var(--text3);
    }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
    .status-dot.error { background: var(--red); }
    .status-dot.loading { background: var(--amber); animation: pulse 1s ease infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* ── Summary cards ── */
    .summary {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 12px 12px 6px;
    }
    .sum-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
    }
    .sum-card.wide { grid-column: span 2; }
    .sum-label { font-size: 9px; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; }
    .sum-value { font-size: 22px; font-weight: 600; color: var(--green); line-height: 1; }
    .sum-value.amber { color: var(--amber); }
    .sum-unit { font-size: 10px; color: var(--text2); margin-top: 2px; }
    .sum-streak { font-size: 13px; color: var(--amber); }

    /* ── Section label ── */
    .section-label {
      font-size: 9px; color: var(--text3); letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 8px 12px 4px;
    }

    /* ── Miner Display Cards ── */
    .miners-grid { padding: 0 8px 20px; display: flex; flex-direction: column; gap: 8px; }

    .nm-card {
      background: #080808;
      border: 2px solid var(--border2);
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }
    .nm-card-top {
      background: #111;
      border-bottom: 1px solid #1a1a1a;
      padding: 5px 10px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nm-card-id { font-size: 12px; color: var(--amber); font-weight: 600; letter-spacing: 0.05em; }
    .nm-card-status { font-size: 10px; display: flex; align-items: center; gap: 4px; }
    .nm-card-status .dot { width: 5px; height: 5px; border-radius: 50%; }
    .nm-card-status.online .dot { background: var(--green); }
    .nm-card-status.online .label { color: var(--green); }
    .nm-card-status.offline .dot { background: var(--red); }
    .nm-card-status.offline .label { color: var(--red); }

    .nm-card-body {
      padding: 8px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: start;
    }

    .nm-lcd {
      background: var(--lcd-bg);
      border: 1px solid var(--lcd-border);
      border-radius: 5px;
      padding: 7px 9px;
    }
    .nm-row {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 5px;
    }
    .nm-row:last-child { margin-bottom: 0; }
    .nm-key { font-size: 9px; color: var(--green-dim); letter-spacing: 0.06em; }
    .nm-val { font-size: 14px; color: var(--green); font-weight: 600; }
    .nm-val.amber { color: var(--amber); }
    .nm-val .unit { font-size: 9px; font-weight: 400; }
    .nm-val.best { font-size: 16px; }

    .nm-bar-wrap { margin-top: 6px; }
    .nm-bar-label { display: flex; justify-content: space-between; font-size: 8px; color: var(--text3); margin-bottom: 3px; }
    .nm-bar-bg { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 2px; height: 4px; overflow: hidden; }
    .nm-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.6s ease; }

    .nm-meta { text-align: right; }
    .nm-meta-row { font-size: 9px; color: var(--text3); margin-bottom: 3px; white-space: nowrap; }
    .nm-meta-row.highlight { color: var(--amber-dim); }

    .nm-footer {
      background: #0a0a0a;
      border-top: 1px solid #111;
      padding: 3px 10px;
      font-size: 8px;
      color: #1e1e1e;
      letter-spacing: 0.1em;
      display: flex; justify-content: space-between;
    }

    /* ── Skeleton loading ── */
    .skeleton { background: var(--bg2); border-radius: 4px; animation: shimmer 1.2s ease infinite; }
    @keyframes shimmer { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }

    /* ── Error state ── */
    .error-box {
      margin: 12px;
      background: var(--bg2);
      border: 1px solid #3a1a1a;
      border-radius: 10px;
      padding: 20px;
      text-align: center;
    }
    .error-icon { font-size: 32px; margin-bottom: 8px; }
    .error-title { color: var(--red); font-size: 13px; margin-bottom: 6px; }
    .error-msg { color: var(--text3); font-size: 11px; line-height: 1.5; }

    /* ── Demo banner ── */
    .demo-banner {
      margin: 0 8px 8px;
      background: rgba(240, 165, 0, 0.08);
      border: 1px solid rgba(240, 165, 0, 0.2);
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 10px;
      color: var(--amber-dim);
      display: flex; align-items: center; gap: 6px;
    }

    /* ── Pull to refresh hint ── */
    .pull-hint {
      text-align: center;
      font-size: 10px;
      color: var(--text3);
      padding: 8px;
    }
  </style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <div class="header-logo">⛏</div>
    <div>
      <div class="header-title">NerdMiner Fleet</div>
      <div class="header-sub">BLITZPOOL SOLO MINING</div>
    </div>
  </div>
  <button class="btn-refresh" id="btn-refresh" onclick="loadData()">
    <svg id="refresh-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="23 4 23 10 17 10"></polyline>
      <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
    </svg>
    Refresh
  </button>
</header>

<div class="status-bar">
  <div class="status-dot loading" id="status-dot"></div>
  <span id="status-text">Verbinde mit Blitzpool…</span>
</div>

<div class="summary">
  <div class="sum-card">
    <div class="sum-label">Gesamt-Hashrate</div>
    <div class="sum-value" id="s-hashrate">–</div>
    <div class="sum-unit" id="s-hr-unit">–</div>
  </div>
  <div class="sum-card">
    <div class="sum-label">Beste Schwierigkeit</div>
    <div class="sum-value amber" id="s-diff">–</div>
    <div class="sum-unit">global best</div>
  </div>
  <div class="sum-card">
    <div class="sum-label">Mining Streak</div>
    <div class="sum-streak" id="s-streak">–</div>
    <div class="sum-unit" id="s-streak-since"></div>
  </div>
  <div class="sum-card">
    <div class="sum-label">Block Luck</div>
    <div class="sum-value" style="font-size:12px; color:#888;" id="s-luck">–</div>
    <div class="sum-unit" id="s-workers">–</div>
  </div>
</div>

<div class="section-label">⬛ Miner-Displays</div>
<div id="demo-banner" style="display:none;" class="demo-banner">
  ⚡ Demo-Modus – echte Daten via Handy-App mit lokalem Netzwerk
</div>
<div class="miners-grid" id="miners-grid">
  <div style="padding: 20px; text-align: center; color: var(--text3); font-size: 12px;">Lade Miner-Daten…</div>
</div>
<div class="pull-hint" id="last-update"></div>

<script>
const ADDRESS = 'bc1qmqhcqyz906fw8djwmt68pe09ynfwjpauy5j8en';
const BASE = 'https://blitzpool.yourdevice.ch:3334';
// Solo Mining API endpoints (from Blitzpool API reference)
const API_MAIN    = `${BASE}/api/client/${ADDRESS}`;               // Adressübersicht
const API_WORKERS = `${BASE}/api/client/${ADDRESS}/worker-shares`; // Share-Verteilung pro Worker
const API_ACCEPTED = `${BASE}/api/client/${ADDRESS}/accepted?range=1d`;
const API_NETWORK = `${BASE}/api/network`;

// ── Formatters ──
function fmtHR(khz) {
  if (!khz && khz !== 0) return { v: '–', u: '' };
  if (khz >= 1e6) return { v: (khz/1e6).toFixed(2), u: 'GH/s' };
  if (khz >= 1e3) return { v: (khz/1e3).toFixed(2), u: 'MH/s' };
  return { v: khz.toFixed(1), u: 'KH/s' };
}
function fmtDiff(d) {
  if (!d && d !== 0) return '–';
  if (d >= 1e9) return (d/1e9).toFixed(2) + 'G';
  if (d >= 1e6) return (d/1e6).toFixed(2) + 'M';
  if (d >= 1e3) return (d/1e3).toFixed(1) + 'K';
  return parseFloat(d).toFixed(2);
}
function fmtUptime(h) {
  if (!h) return '';
  h = parseFloat(h);
  if (h >= 24) return (h/24).toFixed(1) + 'd';
  return h.toFixed(1) + 'h';
}
function timeSince(ts) {
  if (!ts) return '';
  const d = Math.floor((Date.now() - new Date(ts)) / 1000);
  if (d < 60) return d + 's ago';
  if (d < 3600) return Math.floor(d/60) + 'm ago';
  return Math.floor(d/3600) + 'h ago';
}

// ── Status helpers ──
function setStatus(state, msg) {
  const dot = document.getElementById('status-dot');
  dot.className = 'status-dot ' + state;
  document.getElementById('status-text').textContent = msg;
}
function setRefreshLoading(on) {
  document.getElementById('btn-refresh').classList.toggle('loading', on);
}

// ── Render summary ──
// Blitzpool main endpoint fields (discovered from network tab):
//   hashrate, bestDifficulty, miningStreak, miningStreakSince,
//   blockLuck, workerCount, deviceCount, ...
function renderSummary(d) {
  const hr = fmtHR(d.hashrate || d.totalHashrate || 0);
  document.getElementById('s-hashrate').textContent = hr.v;
  document.getElementById('s-hr-unit').textContent = hr.u;

  document.getElementById('s-diff').textContent =
    fmtDiff(d.bestDifficulty || d.bestShare || d.difficulty || 0);

  // Streak: may be seconds/hours number or formatted string
  const streak = d.miningStreak || d.streak || '–';
  document.getElementById('s-streak').textContent = streak;
  const since = d.miningStreakSince || d.streakSince || d.since || '';
  if (since) document.getElementById('s-streak-since').textContent =
    'seit ' + since.slice(0,10);

  // Block luck
  const luck = d.blockLuck || d.luck || '';
  document.getElementById('s-luck').textContent = luck ? '1 in ' + luck : '–';

  // Worker / device count
  const wc = d.workerCount != null ? d.workerCount : '';
  const dc = d.deviceCount != null ? ' · ' + d.deviceCount + ' Geräte' : '';
  document.getElementById('s-workers').textContent = (wc !== '' ? wc + ' Worker' + dc : '–');
}

// ── Render miner cards ──
function renderMiners(sessions) {
  const grid = document.getElementById('miners-grid');
  if (!sessions || !sessions.length) {
    grid.innerHTML = '<div style="padding:20px; text-align:center; color:var(--text3); font-size:12px;">Keine aktiven Sessions gefunden.</div>';
    return;
  }
  const maxHR = Math.max(...sessions.map(s => s.hashrate || s.totalHashrate || 0));

  grid.innerHTML = sessions.map((s, i) => {
    // Blitzpool worker fields: name/sessionId, hashrate, bestDifficulty,
    // uptimeSeconds/uptimeHours, lastSeen/updatedAt, shares/totalShares
    const id = (s.name || s.sessionId || s.workerId || s.id || '????????').toString().slice(0, 8);
    const hr = s.hashrate || s.totalHashrate || s.currentHashrate || 0;
    const hrFmt = fmtHR(hr);
    const diff = s.bestDifficulty || s.bestShare || s.difficulty || 0;
    const uptimeSec = s.uptimeSeconds || (s.uptimeHours ? s.uptimeHours * 3600 : 0) || s.uptime || 0;
    const uptime = fmtUptime(uptimeSec / 3600);
    const lastSeen = timeSince(s.lastSeen || s.updatedAt || s.lastShare);
    const pct = maxHR > 0 ? Math.round((hr / maxHR) * 100) : 0;
    const isOnline = s.online !== false && (!s.lastSeen || (Date.now() - new Date(s.lastSeen)) < 300000);
    const shares = s.totalShares || s.shares || s.acceptedShares || 0;
    const rejected = s.rejected || s.rejectedShares || 0;

    return `
    <div class="nm-card">
      <div class="nm-card-top">
        <span class="nm-card-id">⛏ NERD #${String(i+1).padStart(2,'0')}</span>
        <span class="nm-card-status ${isOnline ? 'online' : 'offline'}">
          <span class="dot"></span>
          <span class="label">${isOnline ? 'ONLINE' : 'OFFLINE'}</span>
        </span>
      </div>
      <div class="nm-card-body">
        <div class="nm-lcd">
          <div class="nm-row">
            <span class="nm-key">HASHRATE</span>
            <span class="nm-val">${hrFmt.v} <span class="unit">${hrFmt.u}</span></span>
          </div>
          <div class="nm-row">
            <span class="nm-key">BEST DIFF</span>
            <span class="nm-val amber best">${fmtDiff(diff)}</span>
          </div>
          <div class="nm-row">
            <span class="nm-key">SESSION</span>
            <span style="font-size:10px; color:var(--green-dim); font-family:'Courier New',monospace;">${id}</span>
          </div>
          <div class="nm-bar-wrap">
            <div class="nm-bar-label">
              <span>Hashrate</span>
              <span>${pct}%</span>
            </div>
            <div class="nm-bar-bg"><div class="nm-bar-fill" style="width:${pct}%"></div></div>
          </div>
        </div>
        <div class="nm-meta">
          ${uptime ? `<div class="nm-meta-row">⏱ ${uptime}</div>` : ''}
          ${lastSeen ? `<div class="nm-meta-row">${lastSeen}</div>` : ''}
          ${shares ? `<div class="nm-meta-row highlight">${shares} shares</div>` : ''}
          ${rejected ? `<div class="nm-meta-row" style="color:#6a2a2a;">${rejected} rej</div>` : ''}
        </div>
      </div>
      <div class="nm-footer">
        <span>LILYGO · NERDMINER V2</span>
        <span>BTC SOLO</span>
      </div>
    </div>`;
  }).join('');
}

// ── Fetch helper ──
async function apiFetch(url) {
  const res = await fetch(url, { headers: { Accept: 'application/json' }, cache: 'no-cache' });
  if (!res.ok) throw new Error('HTTP ' + res.status + ' ' + url);
  return res.json();
}

// ── Main load function ──
async function loadData() {
  setStatus('loading', 'Verbinde mit Blitzpool…');
  setRefreshLoading(true);

  try {
    // Fetch main client stats + worker shares in parallel
    const [main, workersData] = await Promise.all([
      apiFetch(API_MAIN),
      apiFetch(API_WORKERS).catch(() => null)
    ]);

    console.log('📦 main:', JSON.stringify(main).slice(0, 800));
    console.log('📦 workers:', JSON.stringify(workersData).slice(0, 600));

    renderSummary(main);

    // /worker-shares returns object keyed by sessionId, or array
    let sessions = [];
    if (Array.isArray(workersData)) {
      sessions = workersData;
    } else if (workersData && typeof workersData === 'object') {
      // Convert {sessionId: {hashrate, shares, ...}} to array
      sessions = Object.entries(workersData).map(([id, v]) => ({ id, ...v }));
    }
    if (!sessions.length) {
      sessions = main.sessions || main.workers || [];
    }

    renderMiners(sessions);
    document.getElementById('demo-banner').style.display = 'none';
    setStatus('online', 'Live · ' + new Date().toLocaleTimeString('de-CH'));
    document.getElementById('last-update').textContent =
      'Zuletzt aktualisiert: ' + new Date().toLocaleTimeString('de-CH') + ' · Auto-Refresh alle 60s';

  } catch (err) {
    console.warn('API Fehler:', err.message, '– Demo-Modus');
    loadDemo();
    setStatus('error', 'Demo-Modus (CORS) – auf Handy: Live-Daten');
    document.getElementById('demo-banner').style.display = 'flex';
  }

  setRefreshLoading(false);
}

// ── Auto-refresh every 60s ──
loadData();
setInterval(loadData, 60000);

// ── Service Worker registration ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
